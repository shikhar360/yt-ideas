<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Blueprint Presentation</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }
        .section { 
            height: 100vh; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            padding: 50px 100px;
            scroll-snap-align: start;
            position: relative;
            border-bottom: 1px solid #1e293b;
        }
        .content {
            flex: 1;
            max-width: 600px;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.5rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        .talent-zone { 
            width: 400px; 
            height: 600px; 
            border: 3px dashed #ff00ff; 
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(255, 0, 255, 0.05);
        }
        .talent-zone::after {
            content: 'TALENT FRAME';
            color: #ff00ff;
            font-weight: bold;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        #hook { background: radial-gradient(circle at 20% 50%, #1e1b4b 0%, #0b0f19 100%); }
        #hero { background: radial-gradient(circle at 80% 50%, #1e3a8a 0%, #0b0f19 100%); }
        #guide { background: radial-gradient(circle at 50% 20%, #312e81 0%, #0b0f19 100%); }
        #trap { background: radial-gradient(circle at 50% 80%, #450a0a 0%, #0b0f19 100%); }

        .step-list {
            list-style: none;
            padding: 0;
        }
        .step-item {
            margin-bottom: 2rem;
            padding-left: 2rem;
            border-left: 4px solid #3b82f6;
        }
        .step-metaphor {
            font-weight: bold;
            color: #60a5fa;
            display: block;
            margin-bottom: 0.5rem;
        }
        .slide-research .content {
            background: rgba(30, 41, 59, 0.7);
            border-left: 4px solid #3b82f6;
            padding: 2rem;
            max-width: 800px;
        }
        .research-item {
            margin-bottom: 1.5rem;
        }
        .research-item h3 {
            color: #60a5fa;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="hook" class="section">
        <div class="content">
            <h1>{{HOOK_TITLE}}</h1>
            <p>{{HOOK_TEXT}}</p>
        </div>
        <div class="talent-zone"></div>
    </div>

    <div id="hero" class="section">
        <div class="talent-zone"></div>
        <div class="content">
            <h1>{{HERO_TITLE}}</h1>
            <p>{{HERO_BENEFIT}}</p>
        </div>
    </div>

    <div id="guide" class="section">
        <div class="content">
            <h1>The Roadmap</h1>
            <div class="step-list">
                {{GUIDE_STEPS}}
            </div>
        </div>
        <div class="talent-zone"></div>
    </div>

    <div id="trap" class="section">
        <div class="talent-zone"></div>
        <div class="content">
            <h1>The Warning</h1>
            <p>{{TRAP_TEXT}}</p>
        </div>
    </div>

    <div id="research" class="section slide-research">
        <div class="talent-zone"></div>
        <div class="content">
            <h1>Deep Dive & Research</h1>
            <div id="research-content">
                {{RESEARCH_DATA}}
            </div>
        </div>
    </div>

    <script>
        // Simple scroll snap behavior if needed
        document.body.style.scrollSnapType = 'y mandatory';
    </script>
</body>
</html>
